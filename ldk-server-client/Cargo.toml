[package]
name = "ldk-server-client"
version = "0.1.0"
edition = "2021"

[features]
default = []
serde = ["ldk-server-protos/serde"]

[dependencies]
ldk-server-protos = { path = "../ldk-server-protos", features = ["client"] }
tonic = { version = "0.12", features = ["tls"] }
prost = { version = "0.13", default-features = false, features = ["std", "prost-derive"] }
bitcoin_hashes = "0.14"
tokio-stream = { version = "0.1", default-features = false }
